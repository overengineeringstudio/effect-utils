concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: true

name: Devenv Perf

on:
  workflow_dispatch: {}
  schedule:
    - cron: 17 3 * * *

jobs:
  devenv-perf:
    runs-on: [sh-linux-x64, nix]
    defaults:
      run:
        shell: bash
    env:
      FORCE_SETUP: '1'
      CI: 'true'
      GITHUB_TOKEN: ${{ github.token }}
