            local measurement_index="$BASELINE_OUTPUT_DIR/baseline-measurement-files.txt"
            local counts_file="$BASELINE_OUTPUT_DIR/baseline-observation-counts.json"
            find "$BASELINE_OUTPUT_DIR" \
