          path: '${{ runner.temp }}/pnpm-home/${{ github.run_id }}/${{ github.run_attempt }}/${{ github.job }}/store'
          key: "pnpm-store-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/pnpm-lock.yaml') }}"
          restore-keys: 'pnpm-store-${{ runner.os }}-${{ runner.arch }}-'
      - name: Resolve devenv
        run: |
          if [ -z "${DEVENV_REV:-}" ]; then
            DEVENV_REV=$(jq -r .nodes.devenv.locked.rev devenv.lock)
          if [ -z "$DEVENV_REV" ] || [ "$DEVENV_REV" = "null" ]; then
            echo '::error::devenv.lock missing .nodes.devenv.locked.rev'
            exit 1
          fi
          fi

          resolve_devenv() {
            nix build --no-link --print-out-paths "github:cachix/devenv/$DEVENV_REV#devenv"
          }

          # Temporary: capture diagnostics dir for #272 root-cause analysis.
          DIAG_ROOT="${RUNNER_TEMP:-/tmp}/nix-store-diagnostics-${GITHUB_JOB:-job}-${RUNNER_OS:-unknown}-${GITHUB_RUN_ATTEMPT:-0}"
          mkdir -p "$DIAG_ROOT"
          echo "NIX_STORE_DIAGNOSTICS_DIR=$DIAG_ROOT" >> "$GITHUB_ENV"

          {
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner_name=${RUNNER_NAME:-unknown}"
            echo "runner_os=${RUNNER_OS:-unknown}"
            echo "runner_arch=${RUNNER_ARCH:-unknown}"
            echo "github_job=${GITHUB_JOB:-unknown}"
            echo "github_run_id=${GITHUB_RUN_ID:-unknown}"
            echo "nix_user_conf_files=${NIX_USER_CONF_FILES:-}"
            nix --version || true
          } > "$DIAG_ROOT/environment.txt" 2>&1

          if ! DEVENV_OUT=$(resolve_devenv 2> >(tee "$DIAG_ROOT/resolve-devenv.log" >&2)); then
            echo "::error::resolve_devenv failed. Last 30 lines of log:"
            tail -30 "$DIAG_ROOT/resolve-devenv.log" || true
            exit 1
          fi
          DEVENV_BIN="$DEVENV_OUT/bin/devenv"

          # Fast validity check on the devenv store path (~1-2s vs ~25s for devenv info).
          if ! nix-store --check-validity "$DEVENV_OUT" 2>/dev/null; then
            echo "::warning::devenv store path invalid, repairing targeted path..."
            nix-store --repair-path "$DEVENV_OUT" > "$DIAG_ROOT/nix-store-verify-repair.log" 2>&1 || true
            rm -rf ~/.cache/nix/eval-cache-*
            if ! DEVENV_OUT=$(resolve_devenv 2> >(tee "$DIAG_ROOT/resolve-devenv-post-repair.log" >&2)); then
              echo "::error::resolve_devenv failed after repair. Last 30 lines of log:"
              tail -30 "$DIAG_ROOT/resolve-devenv-post-repair.log" || true
              exit 1
            fi
            DEVENV_BIN="$DEVENV_OUT/bin/devenv"
          fi

          echo "DEVENV_BIN=$DEVENV_BIN" >> "$GITHUB_ENV"
          "$DEVENV_BIN" version | tee "$DIAG_ROOT/devenv-version.txt"
        shell: bash
      - name: Evict cached pnpm deps for oxlint-npm
        shell: bash
        run: |
          topDrv=$(nix path-info --derivation '.#oxlint-npm' 2>/dev/null || true)
          if [ -n "$topDrv" ]; then
            while IFS= read -r drv; do
              [ -n "$drv" ] || continue
              while IFS= read -r outPath; do
                [ -n "$outPath" ] || continue
                if [ -e "$outPath" ]; then
                  echo "evicting cached: $(basename "$outPath")"
                  nix store delete "$outPath" 2>/dev/null || true
                fi
              done < <(nix-store -q --outputs "$drv" 2>/dev/null || true)
            done < <(nix-store -qR "$topDrv" 2>/dev/null | grep "pnpm-deps.*\.drv$" || true)
          fi
      - name: Force diagnostics failure (debug)
        if: "${{ github.event_name == 'workflow_dispatch' && (inputs.debug_force_nix_diagnostics_failure == true || inputs.debug_force_nix_diagnostics_failure == 'true') }}"
        shell: bash
        run: |
          diag_dir="${NIX_STORE_DIAGNOSTICS_DIR:-${RUNNER_TEMP:-/tmp}/nix-store-diagnostics-missing}"
          mkdir -p "$diag_dir"
          cat > "$diag_dir/synthetic-signature.log" <<'EOF'
          Failed to convert config.cachix to JSON
          ... while evaluating the option `cachix.package`
          error: path '/nix/store/synthetic-invalid-path' is not valid
          EOF
          echo "::warning::Intentional failure for diagnostics validation (#272)"
          exit 1
      - name: Deploy storybooks to Netlify
        shell: bash
        run: |
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ]; then
            echo "::notice::Skipping Netlify deploy (NETLIFY_AUTH_TOKEN not available)"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            __nix_gc_retry() {
            local __task='devenv tasks run netlify:deploy --input type=prod --mode before' __max=${NIX_GC_RACE_MAX_RETRIES:-10} __heartbeat=${CI_PROGRESS_HEARTBEAT_SECONDS:-60} __n=1 __log __rc __path __start __now __elapsed __hb_pid
            __start=$(date +%s)

            __write_summary() {
              [ -n "${GITHUB_STEP_SUMMARY:-}" ] || return 0
              {
                echo "### CI Task"
                # Keep summary values plain text. Backticks inside double quotes trigger
                # shell command substitution and turned failed-task metadata into bogus
                # commands on GitHub Actions runners.
                echo "- Task: $__task"
                echo "- Status: $1"
                echo "- Duration: $__elapsed s"
                echo "- Attempts: $__n/$__max"
                [ -z "${2:-}" ] || echo "- Note: $2"
              } >> "$GITHUB_STEP_SUMMARY"
            }

            while [ "$__n" -le "$__max" ]; do
              echo "::notice::[ci] starting $__task (attempt $__n/$__max)"
              (
                while sleep "$__heartbeat"; do
                  __now=$(date +%s)
                  __elapsed=$((__now - __start))
                  echo "::notice::[ci] $__task still running after $__elapsed s (attempt $__n/$__max)"
                done
              ) &
              __hb_pid=$!

              __log=$(mktemp)
              set +e; eval "$1" 2> >(tee "$__log" >&2); __rc=$?; set -e

              kill "$__hb_pid" 2>/dev/null || true
              wait "$__hb_pid" 2>/dev/null || true

              __now=$(date +%s)
              __elapsed=$((__now - __start))

              [ $__rc -eq 0 ] && {
                echo "::notice::[ci] completed $__task in $__elapsed s"
                if [ "$__n" -gt 1 ]; then
                  __write_summary success "Recovered from Nix GC race after retry"
                else
                  __write_summary success
                fi
                rm -f "$__log"
                return 0
              }

              __path=$(perl -0pe 's/\e\[[0-9;]*m//g; s/\n/ /g' "$__log" | grep -oP "error:\s+path '\K/nix/store/[^']*(?='\s+is not valid)" 2>/dev/null | head -1 | tr -d '[:space:]' || true)
              rm -f "$__log"
              if [ -z "$__path" ]; then
                echo "::warning::[ci] $__task failed after $__elapsed s without a detected Nix GC race"
                __write_summary failure "No Nix GC race signature detected"
                return $__rc
              fi
              echo "::warning::Nix GC race detected for $__task (attempt $__n/$__max): $__path"
              nix-store --realise "$__path" 2>/dev/null || true
              rm -rf ~/.cache/nix/eval-cache-*
              __n=$((__n + 1))
            done

            __now=$(date +%s)
            __elapsed=$((__now - __start))
            echo "::error::Nix GC race retry exhausted for $__task ($__max attempts)"
            __write_summary failure "Nix GC race retry exhausted"
            return 1
          }; __nix_gc_retry 'if [ -n "${NIX_CONFIG:-}" ]; then NIX_CONFIG_WITH_APPEND=$(printf '"'"'%s\n%s'"'"' "$NIX_CONFIG" '"'"'restrict-eval = false'"'"'); else NIX_CONFIG_WITH_APPEND='"'"'restrict-eval = false'"'"'; fi; NIX_CONFIG="$NIX_CONFIG_WITH_APPEND" PNPM_HOME='"'"'${{ runner.temp }}/pnpm-home/${{ github.run_id }}/${{ github.run_attempt }}/${{ github.job }}'"'"' DT_PASSTHROUGH=1 "${DEVENV_BIN:?DEVENV_BIN not set}" tasks run netlify:deploy --input type=prod --mode before'
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            __nix_gc_retry() {
            local __task='devenv tasks run netlify:deploy --input type=pr --input pr=${{ github.event.pull_request.number }} --mode before' __max=${NIX_GC_RACE_MAX_RETRIES:-10} __heartbeat=${CI_PROGRESS_HEARTBEAT_SECONDS:-60} __n=1 __log __rc __path __start __now __elapsed __hb_pid
            __start=$(date +%s)

            __write_summary() {
              [ -n "${GITHUB_STEP_SUMMARY:-}" ] || return 0
              {
                echo "### CI Task"
                # Keep summary values plain text. Backticks inside double quotes trigger
                # shell command substitution and turned failed-task metadata into bogus
                # commands on GitHub Actions runners.
                echo "- Task: $__task"
                echo "- Status: $1"
                echo "- Duration: $__elapsed s"
                echo "- Attempts: $__n/$__max"
                [ -z "${2:-}" ] || echo "- Note: $2"
              } >> "$GITHUB_STEP_SUMMARY"
            }

            while [ "$__n" -le "$__max" ]; do
              echo "::notice::[ci] starting $__task (attempt $__n/$__max)"
              (
                while sleep "$__heartbeat"; do
                  __now=$(date +%s)
                  __elapsed=$((__now - __start))
                  echo "::notice::[ci] $__task still running after $__elapsed s (attempt $__n/$__max)"
                done
              ) &
              __hb_pid=$!

              __log=$(mktemp)
              set +e; eval "$1" 2> >(tee "$__log" >&2); __rc=$?; set -e

              kill "$__hb_pid" 2>/dev/null || true
              wait "$__hb_pid" 2>/dev/null || true

              __now=$(date +%s)
              __elapsed=$((__now - __start))

              [ $__rc -eq 0 ] && {
                echo "::notice::[ci] completed $__task in $__elapsed s"
                if [ "$__n" -gt 1 ]; then
                  __write_summary success "Recovered from Nix GC race after retry"
                else
                  __write_summary success
                fi
                rm -f "$__log"
                return 0
              }

              __path=$(perl -0pe 's/\e\[[0-9;]*m//g; s/\n/ /g' "$__log" | grep -oP "error:\s+path '\K/nix/store/[^']*(?='\s+is not valid)" 2>/dev/null | head -1 | tr -d '[:space:]' || true)
              rm -f "$__log"
              if [ -z "$__path" ]; then
                echo "::warning::[ci] $__task failed after $__elapsed s without a detected Nix GC race"
                __write_summary failure "No Nix GC race signature detected"
                return $__rc
              fi
              echo "::warning::Nix GC race detected for $__task (attempt $__n/$__max): $__path"
              nix-store --realise "$__path" 2>/dev/null || true
              rm -rf ~/.cache/nix/eval-cache-*
              __n=$((__n + 1))
            done

            __now=$(date +%s)
            __elapsed=$((__now - __start))
            echo "::error::Nix GC race retry exhausted for $__task ($__max attempts)"
            __write_summary failure "Nix GC race retry exhausted"
            return 1
          }; __nix_gc_retry 'if [ -n "${NIX_CONFIG:-}" ]; then NIX_CONFIG_WITH_APPEND=$(printf '"'"'%s\n%s'"'"' "$NIX_CONFIG" '"'"'restrict-eval = false'"'"'); else NIX_CONFIG_WITH_APPEND='"'"'restrict-eval = false'"'"'; fi; NIX_CONFIG="$NIX_CONFIG_WITH_APPEND" PNPM_HOME='"'"'${{ runner.temp }}/pnpm-home/${{ github.run_id }}/${{ github.run_attempt }}/${{ github.job }}'"'"' DT_PASSTHROUGH=1 "${DEVENV_BIN:?DEVENV_BIN not set}" tasks run netlify:deploy --input type=pr --input pr=${{ github.event.pull_request.number }} --mode before'
          fi
      - name: Post deploy URLs
        if: always() && !cancelled()
        shell: bash
        env:
          GH_TOKEN: '${{ github.token }}'
          GH_REPO: '${{ github.repository }}'
        run: |
          site="overeng-utils"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            label="prod"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            label="PR #${{ github.event.pull_request.number }}"
          else
            exit 0
          fi
          # Set Netlify branch-deploy suffix based on mode
          if [ "$label" = "prod" ]; then suffix=""; else suffix="-pr-${{ github.event.pull_request.number }}"; fi

          rows=""
          for dir in packages/@overeng/*/storybook-static; do
            [ -d "$dir" ] || continue
            name="${dir#packages/@overeng/}"
            name="${name%/storybook-static}"
            url="https://${name}${suffix}--${site}.netlify.app"
            rows="${rows}| ${name} | ${url} |\n"
          done

          if [ -z "$rows" ]; then
            echo "No storybooks were deployed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Write job summary
          {
            echo "## Storybook Previews ($label)"
            echo ""
            echo "| Package | URL |"
            echo "| --- | --- |"
            echo -e "$rows"
          } >> "$GITHUB_STEP_SUMMARY"

          # Post/update PR comment
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "## Storybook Previews"
              echo ""
              echo "| Package | URL |"
              echo "| --- | --- |"
              echo -e "$rows"
            } > /tmp/comment.md
            export NIX_CONFIG="${NIX_CONFIG:+$NIX_CONFIG$'\n'}access-tokens = github.com=${GH_TOKEN}"
            nix run nixpkgs#gh -- pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md --edit-last 2>/dev/null \
              || nix run nixpkgs#gh -- pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md
          fi
      - name: Nix diagnostics summary
        if: failure()
        shell: bash
        run: |
          diag_dir="${NIX_STORE_DIAGNOSTICS_DIR:-}"
          if [ -z "$diag_dir" ] || [ ! -d "$diag_dir" ]; then
            echo "## Nix Store Diagnostics" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No diagnostics directory found (validation may have failed before capture)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## Nix Store Diagnostics"
            echo ""
            echo "Temporary instrumentation for #272; remove after root cause is confirmed and CI is stable."
            echo ""
            echo "- Diagnostics directory: \`$diag_dir\`"
            echo "- Tracking issue: https://github.com/overengineeringstudio/effect-utils/issues/272"
          } >> "$GITHUB_STEP_SUMMARY"

          markers_file="${RUNNER_TEMP:-/tmp}/nix-store-signature-markers.txt"
          grep -R -n -E "config\\.cachix|cachix\\.package|error: path '/nix/store/.+ is not valid" --exclude="$(basename "$markers_file")" "$diag_dir" > "$markers_file" || true

          if [ -s "$markers_file" ]; then
            {
              echo ""
              echo "### Signature markers"
              echo '```text'
              sed -n "1,120p" "$markers_file"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- No signature markers found in captured diagnostics." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload Nix diagnostics artifact
        if: failure() && env.NIX_STORE_DIAGNOSTICS_DIR != ''
        uses: actions/upload-artifact@v4
        with:
          name: 'nix-store-diagnostics-${{ github.job }}-${{ runner.os }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}'
          path: '${{ env.NIX_STORE_DIAGNOSTICS_DIR }}'
          if-no-files-found: ignore
          retention-days: 14
      - name: Failure note
        if: failure()
        shell: bash
        run: |
          echo "If this looks like Namespace runner Nix store corruption (e.g. \"... is not valid\", \"config.cachix\", \"cachix.package\"), add the run link + full nix-store output to:"
          echo "  https://github.com/overengineeringstudio/effect-utils/issues/201"
  notify-alignment:
    runs-on: [sh-linux-x64, nix]
    needs: [typecheck, lint, test, nix-check]
    if: (github.ref == 'refs/heads/main') && github.event_name == 'push'
    steps:
      - name: Dispatch alignment to coordinator
        env:
          GH_TOKEN: '${{ secrets.MEGAREPO_ALIGNMENT_TOKEN }}'
        run: "export NIX_CONFIG=\"${NIX_CONFIG:+$NIX_CONFIG$'\\n'}access-tokens = github.com=${GH_TOKEN}\" && printf '{\"event_type\":\"upstream-changed\",\"client_payload\":{\"source_repo\":\"%s\",\"source_sha\":\"%s\"}}' \"${{ github.repository }}\" \"${{ github.sha }}\" | nix run nixpkgs#gh -- api repos/schickling/megarepo-all/dispatches --input -"
        shell: bash
