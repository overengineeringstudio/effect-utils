      - name: Enable Cachix cache
        uses: cachix/cachix-action@v17
        with:
          name: overeng-effect-utils
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Resolve devenv
        run: |
          if [ -z "${DEVENV_REV:-}" ]; then
            DEVENV_REV=$(jq -r .nodes.devenv.locked.rev devenv.lock)
