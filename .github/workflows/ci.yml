            fi
          }

          baseline_requirements_satisfied() {
            if [ "$required_observation_count" -eq 0 ]; then
              return 1
            fi
            write_baseline_observation_counts
            jq -e '.required | all(.satisfied == true)' "$BASELINE_OUTPUT_DIR/baseline-observation-counts.json" >/dev/null
          }

