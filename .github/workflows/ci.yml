          downloaded_runs_file="$BASELINE_OUTPUT_DIR/baseline-runs.jsonl"
          seen_runs_file="$BASELINE_OUTPUT_DIR/baseline-seen-runs.txt"
          : >"$downloaded_runs_file"
          : >"$seen_runs_file"
          for candidate_run in $candidate_runs; do
