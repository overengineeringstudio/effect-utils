[project]
name = "effect-utils"
revision = "1.0"

[profiles.default]
NOTION_API_TOKEN = { description = "Notion integration token for live Notion integration tests", required = false }
NOTION_TEST_PARENT_PAGE_ID = { description = "Dedicated scratch Notion parent page used by live Notion integration tests", required = false }
NOTION_DATASOURCE_SYNC_PARENT_PAGE_ID = { description = "Dedicated scratch Notion parent page for notion-datasource-sync live E2E tests; falls back to NOTION_TEST_PARENT_PAGE_ID when unset", required = false }
NOTION_DATASOURCE_SYNC_E2E_LEDGER_PAGE_ID = { description = "Optional visible Notion ledger page for sanitized notion-datasource-sync live E2E summaries", required = false }
NOTION_DATASOURCE_SYNC_DEMO_PAGE_ID = { description = "Optional durable demo page for the notion-datasource-sync live showcase; used only for explicit demo runs", required = false }
