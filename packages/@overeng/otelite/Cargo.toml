[package]
name = "otelite"
version = "0.0.0"
edition = "2021"
description = "Local OTLP capture tool for E2E and instrumentation tests"
license = "MIT"

[lib]
name = "otelite"
path = "src/lib.rs"

[[bin]]
name = "otelite"
path = "src/main.rs"

[dependencies]
# Tokio runtime shared by the HTTP (axum/hyper) and gRPC (tonic) receivers.
tokio = { version = "1", features = [
  "rt-multi-thread",
  "macros",
  "net",
  "process",
  "signal",
  "sync",
  "fs",
  "io-util",
] }
axum = "0.7"
tonic = "0.12"
prost = "0.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# opentelemetry-proto provides the message types, canonical OTLP/JSON serde,
# protobuf decode, AND the generated tonic server traits + *Server adapters.
opentelemetry-proto = { version = "0.27", default-features = false, features = [
  "gen-tonic",
  "trace",
  "metrics",
  "logs",
  "with-serde",
] }

[dev-dependencies]
# Test-only OTLP clients driving the receiver end-to-end (no mocks).
reqwest = { version = "0.12", default-features = false, features = [
  "rustls-tls",
] }
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
strip = "symbols"
